    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #F3F4F6;

        .main-container {
            display: flex;

        .sidebar {

            background: #fff;
            border-right: 1px solid #e5e7eb;

        .new-chat-btn {

            align-items: center;

            background: #0d4fd8;

        .conversations-list {
            flex: 1;

        .conversation-item {
            padding: 12px;

        .conversation-item:hover {

        .conversation-item .conv-icon {

        .conversation-item.active .conv-icon {

        .conversation-item .conv-info {

        .conversation-item .conv-title {

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s;
            }
            .sidebar.open {
                left: 0;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;

                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }
            .sidebar-overlay.show {
                display: block;
            }
            .toggle-sidebar-btn {
                display: flex;
            }
        }
        @media (min-width: 769px) {
            .toggle-sidebar-btn {
                display: none;
            }
            .sidebar-overlay {
                display: none !important;
            }
        }
        .toggle-sidebar-btn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            color: #165DFF;
            border-radius: 6px;
        }
        .toggle-sidebar-btn:hover {
            background: #f3f4f6;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .message {
            margin-bottom: 1rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thinking-block {
            margin: 0 0 12px 0;
        }
        .thinking-block details {
            border-left: 3px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 4px;
        }
        .thinking-block details[open] summary {
            border-bottom: 1px solid #e5e7eb;
        }
        .thinking-block summary {
            display: flex;
            cursor: pointer;
            user-select: none;
            list-style: none;
            align-items: center;
            whitespace: nowrap;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 13px;
            color: #6b7280;
            transition: all 0.2s;
        }
        .thinking-block summary::-webkit-details-marker {
            display: none;
        }
        .thinking-block summary:hover {
            background: #f3f4f6;
        }
        .thinking-block summary .think-icon {
            display: flex;
            align-items: center;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .thinking-block summary .think-icon svg {
            width: 12px;
            height: 12px;
            transition: transform 0.3s ease;
            color: #9ca3af;
        }
        .thinking-block details[open] summary .think-icon svg {
            transform: rotate(90deg);
        }
        .thinking-content {
            padding: 12px;
            font-size: 12px;
            line-height: 1.6;
            color: #6b7280;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 12px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #165DFF;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            font-weight: bold;
            margin: 1rem 0 0.5rem;
        }
        .markdown-content h1 { font-size: 1.5rem; }

        .markdown-content li { margin: 0.25rem 0; }

        .markdown-content pre code {
            background: transparent;

        .markdown-content table {
            width: 100%;

        .markdown-content th, .markdown-content td {

        .markdown-content th {

        }
        .markdown-content strong { font-weight: 600; }
        .markdown-content blockquote {

        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;

        }
        .file-upload-area {
            position: relative;
        }
        .file-upload-btn {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            cursor: pointer;
            transition: color 0.2s;
        }
        .file-upload-btn:hover {
            color: #165DFF;
        }
        .file-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .file-preview .remove-file {
            cursor: pointer;
            color: #ef4444;
            margin-left: auto;
        }
        .message-file {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.2);

            margin-top: 8px;

        }
        .user-message-text {
            font-size: 14px;

        }
        .assistant-message-text {
            font-size: 14px;

        }
        #user-input {
            padding-left: 44px;
        }
    </style>

    <script>
        const DIFY_API_KEY = 'app-99L4qvG2FF9611Pl6OkYSkbo';
        const DIFY_BASE_URL = 'http://101.35.56.39/v1';
        const DIFY_USER_ID = localStorage.getItem('dify_user_id') || (() => {
            const userId = 'user-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('dify_user_id', userId);
            return userId;
        })();
        
        let conversationId = '';
        let isGenerating = false;
        let uploadedFiles = [];
        let conversations = [];
        let currentConversationId = null;

        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const fileInput = document.getElementById('file-input');
        const filePreviewContainer = document.getElementById('file-preview-container');
        const conversationsList = document.getElementById('conversations-list');
        const newChatBtn = document.getElementById('new-chat-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const toggleSidebarBtn = document.getElementById('toggle-sidebar-btn');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function parseMarkdown(text) {
            let html = escapeHtml(text);
            
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            html = html.replace(/^\s*[-*+]\s+(.*)$/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            
            html = html.replace(/^\s*(\d+)\.\s+(.*)$/gim, '<li>$2</li>');
            
            html = html.replace(/^>\s*(.*)$/gim, '<blockquote>$1</blockquote>');
            
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            
            return '<p>' + html + '</p>';
        }

        function addMessage(role, content, thinkingContent = null, files = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            if (role === 'user') {
                let filesHtml = '';
                if (files && files.length > 0) {
                    filesHtml = files.map(file => `
                        <div class="message-file">
                            <i class="fa fa-file-o"></i>
                            <span>${escapeHtml(file.name)}</span>
                        </div>
                    `).join('');
                }
                
                messageDiv.innerHTML = `
                    <div class="flex items-end gap-2 max-w-[80%]">
                        <div class="bg-[#E8F3FF] text-gray-800 px-3 py-2 rounded-2xl rounded-br-md">
                            <div class="markdown-content user-message-text">${parseMarkdown(content)}</div>
                            ${filesHtml}
                        </div>
                        <div class="w-8 h-8 bg-[#E8F3FF] rounded-full flex items-center justify-center flex-shrink-0">
                            <i class="fa fa-user text-[#165DFF] text-sm"></i>
                        </div>
                    </div>
                `;
            } else {
                let thinkingHtml = '';
                if (thinkingContent) {
                    thinkingHtml = `
                        <div class="thinking-block">
                            <details>
                                <summary>
                                    <div class="think-icon">
                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                        </svg>
                                    </div>
                                    <span>已深度思考</span>
                                </summary>
                                <div class="thinking-content">${escapeHtml(thinkingContent)}</div>
                            </details>
                        </div>
                    `;
                }
                
                messageDiv.innerHTML = `
                    <div class="max-w-[85%]">
                        <div class="flex items-start gap-2 mb-1">
                            <img src="量仔.png" alt="量仔" class="w-8 h-8 rounded-full flex-shrink-0 object-cover bg-primary">
                            <span class="text-sm text-gray-500 font-medium">量仔</span>
                        </div>
                        ${thinkingHtml}
                        <div class="bg-gray-100 px-3 py-2 rounded-2xl rounded-tl-md markdown-content assistant-message-text">${parseMarkdown(content)}</div>
                    </div>
                `;
            }
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message flex justify-start';
            messageDiv.id = 'typing-indicator';
            messageDiv.innerHTML = `
                <div class="bg-gray-100 px-3 py-2 rounded-2xl">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function setStatus(text, color = 'text-gray-500') {
            statusEl.textContent = text;
            statusEl.className = `text-xs ${color}`;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function updateFilePreview() {
            filePreviewContainer.innerHTML = '';
            uploadedFiles.forEach((file, index) => {
                const previewDiv = document.createElement('div');
                previewDiv.className = 'file-preview';
                previewDiv.innerHTML = `
                    <i class="fa fa-file-o text-gray-500"></i>
                    <span class="text-gray-700">${escapeHtml(file.name)}</span>
                    <span class="text-gray-400 text-xs">${formatFileSize(file.size)}</span>
                    <span class="remove-file" onclick="removeFile(${index})">
                        <i class="fa fa-times"></i>
                    </span>
                `;
                filePreviewContainer.appendChild(previewDiv);
            });
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            updateFilePreview();
        }

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (uploadedFiles.length < 5) {
                    uploadedFiles.push(file);
                }
            });
            updateFilePreview();
            fileInput.value = '';
        });

        async function uploadFileToDify(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('user', DIFY_USER_ID);

            try {
                const response = await fetch(`${DIFY_BASE_URL}/files/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    },
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`文件上传失败: ${response.status}`);
                }

                const result = await response.json();
                return result.id;
            } catch (error) {
                console.error('文件上传错误:', error);
                return null;
            }
        }

        async function sendMessage(query) {
            if (isGenerating || !query.trim()) return;
            
            isGenerating = true;
            sendBtn.disabled = true;
            setStatus('正在思考...', 'text-blue-500');
            
            const currentFiles = [...uploadedFiles];
            const filesToSend = currentFiles.length > 0 ? currentFiles : null;
            
            addMessage('user', query, null, filesToSend);
            uploadedFiles = [];
            updateFilePreview();
            
            addTypingIndicator();
            
            try {
                let fileIds = [];
                if (currentFiles.length > 0) {
                    setStatus('上传文件中...', 'text-blue-500');
                    for (const file of currentFiles) {
                        const fileId = await uploadFileToDify(file);
                        if (fileId) {
                            fileIds.push({ type: 'document', transfer_method: 'local_file', upload_file_id: fileId });
                        }
                    }
                    setStatus('正在思考...', 'text-blue-500');
                }

                const response = await fetch(`${DIFY_BASE_URL}/chat-messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    },
                    body: JSON.stringify({
                        inputs: {},
                        query: query,
                        response_mode: 'streaming',
                        conversation_id: conversationId,
                        user: DIFY_USER_ID,
                        files: fileIds.length > 0 ? fileIds : undefined
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                removeTypingIndicator();
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullAnswer = '';
                let thinkingText = '';
                let currentMessageEl = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.slice(5));
                                
                                if (data.event === 'message') {
                                    fullAnswer += data.answer;
                                    if (!currentMessageEl) {
                                        currentMessageEl = addMessage('assistant', fullAnswer);
                                    } else {
                                        const contentEl = currentMessageEl.querySelector('.markdown-content:last-child');
                                        if (contentEl) {
                                            contentEl.innerHTML = parseMarkdown(fullAnswer);
                                        }
                                    }
                                    scrollToBottom();
                                } else if (data.event === 'agent_thought') {
                                    if (data.thought) {
                                        thinkingText += data.thought + '\n';
                                    }
                                } else if (data.event === 'message_end') {
                                    conversationId = data.conversation_id;
                                    if (thinkingText && currentMessageEl) {
                                        const thinkingBlock = document.createElement('div');
                                        thinkingBlock.className = 'thinking-block';
                                        thinkingBlock.innerHTML = `
                                            <details>
                                                <summary>
                                                    <div class="think-icon">
                                                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                                        </svg>
                                                    </div>
                                                    <span>已深度思考</span>
                                                </summary>
                                                <div class="thinking-content">${escapeHtml(thinkingText)}</div>
                                            </details>
                                        `;
                                        const assistantContent = currentMessageEl.querySelector('.max-w-\\[85\\%\\]');
                                        if (assistantContent) {
                                            const firstMarkdown = assistantContent.querySelector('.bg-gray-100');
                                            if (firstMarkdown) {
                                                assistantContent.insertBefore(thinkingBlock, firstMarkdown);
                                            }
                                        }
                                    }
                                } else if (data.event === 'error') {
                                    throw new Error(data.message);
                                }
                            } catch (e) {
                                if (e.message && !e.message.includes('JSON')) {
                                    console.error('Parse error:', e);
                                }
                            }
                        }
                    }
                }

                setStatus('在线', 'text-green-500');
                loadConversations();
                
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage('assistant', `抱歉，发生了错误：${error.message}`);
                setStatus('错误', 'text-red-500');
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', () => {
            const query = userInput.value.trim();
            if (query) {
                sendMessage(query);
                userInput.value = '';
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        function testThinkingBlock() {
            const testContent = '这是一个测试思考内容\n支持多行显示\n可以验证折叠效果是否正常工作';
            addMessage('assistant', '这是一条测试消息，用于验证思考内容的折叠效果。', testContent);
            console.log('测试思考块已添加，请查看消息区域');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const pendingIssueJSON = sessionStorage.getItem('pendingIssue');
            
            if (pendingIssueJSON) {
                try {
                    const data = JSON.parse(pendingIssueJSON);
                    
                    let report = `### 问题澄清单\n\n`;
                    report += `**客户名称:** ${data.customerName}\n`;
                    report += `**问题环境:** ${data.environment}\n`;
                    report += `**产品版本:** ${data.productVersion}\n`;
                    report += `**硬件平台:** ${data.hardwarePlatform}\n`;
                    report += `**操作系统:** ${data.osVersion}\n`;
                    report += `**问题严重性:** ${data.severity}\n`;
                    report += `**紧急程度:** ${data.urgency}\n\n`;
                    report += `#### 问题详情\n\n`;
                    report += `**问题大类:** ${data.category}\n`;

                    if (data.category === 'exBase') {
                        report += `**源库及版本:** ${data.exBase.sourceDbVersion}\n`;
                        report += `**目标库及版本:** ${data.exBase.targetDbVersion}\n`;
                        report += `**执行具体动作:** ${data.exBase.actionExecuted}\n`;
                    } else if (data.category === 'G100') {
                        report += `**兼容模式:** ${data.g100.compatMode}\n`;
                    } else if (data.category === 'VEM') {
                        report += `**功能模块:** ${data.vem.featureModule}\n`;
                        report += `**复现步骤:** ${data.vem.reproSteps}\n`;
                    }
                    
                    report += `\n**问题描述:**\n${data.description}\n\n`;

                    if (data.files && data.files.length > 0) {
                        report += `--- \n### 附件信息\n`;
                        data.files.forEach(file => {
                            report += `- **${file.name}** (${(file.size / 1024).toFixed(2)} KB)\n`;
                            if (file.type && file.type.startsWith('text/')) {
                                try {
                                    const fileContent = atob(file.content.split(',')[1]);
                                    report += '```\n' + fileContent.substring(0, 1000) + (fileContent.length > 1000 ? '...内容已截断' : '') + '\n```\n';
                                } catch (e) {
                                    report += '`无法预览文件内容`\n';
                                }
                            }
                        });
                    }

                    sessionStorage.removeItem('pendingIssue');
                    
                    setTimeout(() => {
                        sendMessage(report);
                    }, 500);
                    
                } catch (e) {
                    console.error("解析问题数据失败:", e);
                }
            }
            
            loadConversations();
        });

        async function loadConversations() {
            conversationsList.innerHTML = '<div class="loading-indicator"><i class="fa fa-spinner"></i> 加载中...</div>';
            
            try {
                const response = await fetch(`${DIFY_BASE_URL}/conversations?user=${DIFY_USER_ID}&limit=100&pinned=false`, {
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                conversations = data.data || [];
                renderConversationsList();
            } catch (error) {
                console.error('加载对话列表失败:', error);
                conversationsList.innerHTML = '<div class="empty-state"><i class="fa fa-comments"></i><p>加载失败</p></div>';
            }
        }

        function renderConversationsList() {
            conversationsList.innerHTML = '';
            
            if (conversations.length === 0) {
                conversationsList.innerHTML = '<div class="empty-state"><i class="fa fa-comments"></i><p>暂无对话记录</p><p style="font-size: 12px; margin-top: 4px;">点击上方按钮开启新对话</p></div>';
                return;
            }
            
            conversations.forEach(conv => {
                const item = document.createElement('div');
                item.className = `conversation-item ${currentConversationId === conv.id ? 'active' : ''}`;
                item.dataset.id = conv.id;
                
                const title = conv.name || conv.intro || '未命名对话';
                const time = formatConversationTime(conv.updated_at || conv.created_at);
                
                item.innerHTML = `
                    <div class="conv-icon">
                        <i class="fa fa-comment-o"></i>
                    </div>
                    <div class="conv-info">
                        <div class="conv-title">${escapeHtml(title)}</div>
                        <div class="conv-time">${time}</div>
                    </div>
                `;
                
                item.addEventListener('click', () => {
                    switchConversation(conv.id);
                });
                
                conversationsList.appendChild(item);
            });
        }

        function formatConversationTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;
            
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        async function switchConversation(convId) {
            if (isGenerating) return;
            
            currentConversationId = convId;
            messagesContainer.innerHTML = '';
            conversationId = convId;
            
            renderConversationsList();
            closeSidebar();
            
            try {
                setStatus('加载中...', 'text-blue-500');
                const response = await fetch(`${DIFY_BASE_URL}/messages?user=${DIFY_USER_ID}&conversation_id=${convId}&limit=20&last_id=`, {
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const messages = data.data || [];
                
                messages.reverse().forEach(msg => {
                    if (msg.query) {
                        addMessage('user', msg.query);
                    }
                    if (msg.answer) {
                        addMessage('assistant', msg.answer);
                    }
                });
                
                setStatus('在线', 'text-green-500');
            } catch (error) {
                console.error('加载消息失败:', error);
                setStatus('错误', 'text-red-500');
            }
        }

        newChatBtn.addEventListener('click', () => {
            if (isGenerating) return;
            
            currentConversationId = null;
            conversationId = '';
            messagesContainer.innerHTML = '';
            
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            
            userInput.focus();
            setStatus('在线', 'text-green-500');
            closeSidebar();
        });
        
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        }
        
        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        }
        
        toggleSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
