    <script>
        const DIFY_API_KEY = 'app-99L4qvG2FF9611Pl6OkYSkbo';
        const DIFY_BASE_URL = 'http://101.35.56.39/v1';
        const DIFY_USER_ID = 'mvs-user';
        
        let conversationId = '';
        let isGenerating = false;
        let uploadedFiles = [];
        let conversations = [];
        let currentConversationId = null;
        let messagePollingInterval = null;
        let messagePollingTimeout = null;
        let pollingStatusInterval = null;
        let pollingStartTime = null;
        let pollingRetryCount = 0;
        let pollingCurrentInterval = 2000;
        let pollingStats = {
            totalRequests: 0,
            successfulRequests: 0,
            failedRequests: 0,
            totalRetries: 0,
            lastError: null,
            lastSuccessTime: null
        };
        const POLLING_MAX_DURATION = 600000; // 10分钟
        const POLLING_MAX_RETRIES = 5;
        const POLLING_INTERVALS = [2000, 5000, 10000, 30000, 60000]; // 指数退避间隔

        // AbortSignal.timeout polyfill for older browsers
        if (!AbortSignal.timeout) {
            AbortSignal.timeout = function(ms) {
                const controller = new AbortController();
                setTimeout(() => controller.abort(new DOMException('TimeoutError', 'TimeoutError')), ms);
                return controller.signal;
            };
        }

        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const fileInput = document.getElementById('file-input');
        const filePreviewContainer = document.getElementById('file-preview-container');
        const conversationsList = document.getElementById('conversations-list');
        const newChatBtn = document.getElementById('new-chat-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const toggleSidebarBtn = document.getElementById('toggle-sidebar-btn');
        const retryPollingBtn = document.getElementById('retry-polling-btn');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function cleanWhitespace(text) {
            // 清理多余的空白字符：连续的换行符、制表符和空格
            // 保留代码块中的格式
            let cleaned = text;
            
            // 首先保护代码块，避免清理代码块内的格式
            const codeBlockRegex = /```[\s\S]*?```/g;
            const codeBlocks = [];
            let match;
            let index = 0;
            
            // 提取并临时替换代码块
            while ((match = codeBlockRegex.exec(text)) !== null) {
                codeBlocks.push(match[0]);
                cleaned = cleaned.replace(match[0], `__CODE_BLOCK_${index}__`);
                index++;
            }
            
            // 清理普通文本中的多余空白
            // 1. 将制表符替换为空格
            cleaned = cleaned.replace(/\t/g, ' ');
            
            // 2. 清理行首和行尾的空白
            cleaned = cleaned.replace(/^[ \t]+/gm, '');
            cleaned = cleaned.replace(/[ \t]+$/gm, '');
            
            // 3. 将连续的多个换行符替换为单个换行符
            cleaned = cleaned.replace(/\n{3,}/g, '\n\n');
            
            // 4. 将连续的多个空格替换为单个空格
            cleaned = cleaned.replace(/[ ]{2,}/g, ' ');
            
            // 5. 清理空行中的空格
            cleaned = cleaned.replace(/^\s*$/gm, '');
            
            // 恢复代码块
            codeBlocks.forEach((block, i) => {
                cleaned = cleaned.replace(`__CODE_BLOCK_${i}__`, block);
            });
            
            return cleaned.trim();
        }

        function parseMarkdown(text) {
            // 首先清理多余的空白字符
            text = cleanWhitespace(text);
            
            // 恢复被优化的格式：将全角波浪号恢复为半角波浪号
            text = text.replace(/～(\d{1,2}:\d{2})/g, '~$1');
            
            if (typeof marked !== 'undefined') {
                try {
                    marked.setOptions({
                        breaks: true,
                        gfm: true
                    });
                    return marked.parse(text);
                } catch (e) {
                    console.error('Markdown parse error:', e);
                }
            }
            
            let html = escapeHtml(text);
            
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            html = html.replace(/^\s*[-*+]\s+(.*)$/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            
            html = html.replace(/^\s*(\d+)\.\s+(.*)$/gim, '<li>$2</li>');
            
            html = html.replace(/^>\s*(.*)$/gim, '<blockquote>$1</blockquote>');
            
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            
            return '<p>' + html + '</p>';
        }

        function cleanImageTags(text) {
            // 处理图片标签：将<img>标签替换为"图片："格式的文本描述
            // 匹配各种格式的img标签，包括自闭合标签和带结束标签的
            return text.replace(/<img\s+[^>]*>/gi, '图片：')
                       .replace(/<img\s+[^>]*\/>/gi, '图片：')
                       .replace(/<img\s+[^>]*><\/img>/gi, '图片：');
        }

        function addMessage(role, content, files = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            if (role === 'user') {
                let filesHtml = '';
                if (files && files.length > 0) {
                    filesHtml = files.map(file => `
                        <div class="message-file">
                            <i class="fa fa-file-o"></i>
                            <span>${escapeHtml(file.name)}</span>
                        </div>
                    `).join('');
                }
                
                messageDiv.innerHTML = `
                    <div class="flex items-end gap-2 max-w-[80%]">
                        <div class="bg-[#E8F3FF] text-gray-800 px-3 py-2 rounded-2xl rounded-br-md">
                            <div class="markdown-content user-message-text">${parseMarkdown(content)}</div>
                            ${filesHtml}
                        </div>
                        <div class="w-8 h-8 bg-[#E8F3FF] rounded-full flex items-center justify-center flex-shrink-0">
                            <i class="fa fa-user text-[#165DFF] text-sm"></i>
                        </div>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="max-w-[85%]">
                        <div class="flex items-start gap-2 mb-1">
                            <img src="量仔.png" alt="量仔" class="w-8 h-8 rounded-full flex-shrink-0 object-cover bg-primary">
                            <span class="text-sm text-gray-500 font-medium">量仔</span>
                        </div>
                        <div class="bg-gray-100 px-3 py-2 rounded-2xl rounded-tl-md markdown-content assistant-message-text">${parseMarkdown(content)}</div>
                    </div>
                `;
            }
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message flex justify-start';
            messageDiv.id = 'typing-indicator';
            messageDiv.innerHTML = `
                <div class="bg-gray-100 px-3 py-2 rounded-2xl">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function setStatus(text, color = 'text-gray-500') {
            statusEl.textContent = text;
            statusEl.className = `text-xs ${color}`;
            
            // 显示/隐藏恢复按钮
            if (text.includes('轮询失败') || text.includes('AI思考超时')) {
                retryPollingBtn.classList.remove('hidden');
            } else {
                retryPollingBtn.classList.add('hidden');
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function updateFilePreview() {
            filePreviewContainer.innerHTML = '';
            uploadedFiles.forEach((file, index) => {
                const previewDiv = document.createElement('div');
                previewDiv.className = 'file-preview';
                previewDiv.innerHTML = `
                    <i class="fa fa-file-o text-gray-500"></i>
                    <span class="text-gray-700">${escapeHtml(file.name)}</span>
                    <span class="text-gray-400 text-xs">${formatFileSize(file.size)}</span>
                    <span class="remove-file" onclick="removeFile(${index})">
                        <i class="fa fa-times"></i>
                    </span>
                `;
                filePreviewContainer.appendChild(previewDiv);
            });
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            updateFilePreview();
        }

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (uploadedFiles.length < 5) {
                    uploadedFiles.push(file);
                }
            });
            updateFilePreview();
            fileInput.value = '';
        });

        async function uploadFileToDify(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('user', DIFY_USER_ID);

            try {
                const response = await fetch(`${DIFY_BASE_URL}/files/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    },
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`文件上传失败: ${response.status}`);
                }

                const result = await response.json();
                return result.id;
            } catch (error) {
                console.error('文件上传错误:', error);
                return null;
            }
        }

        async function sendMessage(query) {
            if (isGenerating || !query.trim()) return;
            
            isGenerating = true;
            sendBtn.disabled = true;
            setStatus('正在思考...', 'text-blue-500');
            
            const currentFiles = [...uploadedFiles];
            const filesToSend = currentFiles.length > 0 ? currentFiles : null;
            
            // 清理用户输入中的多余空白
            const cleanedQuery = cleanWhitespace(query);
            addMessage('user', cleanedQuery, filesToSend);
            uploadedFiles = [];
            updateFilePreview();
            
            addTypingIndicator();
            
            try {
                let fileIds = [];
                if (currentFiles.length > 0) {
                    setStatus('上传文件中...', 'text-blue-500');
                    for (const file of currentFiles) {
                        const fileId = await uploadFileToDify(file);
                        if (fileId) {
                            fileIds.push({ type: 'document', transfer_method: 'local_file', upload_file_id: fileId });
                        }
                    }
                    setStatus('正在思考...', 'text-blue-500');
                }

                const response = await fetch(`${DIFY_BASE_URL}/chat-messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    },
                    body: JSON.stringify({
                        inputs: {},
                        query: query,
                        response_mode: 'streaming',
                        conversation_id: conversationId,
                        user: DIFY_USER_ID,
                        files: fileIds.length > 0 ? fileIds : undefined
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                removeTypingIndicator();
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullAnswer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.slice(5));
                                
                                if (data.event === 'message') {
                                    fullAnswer += data.answer || '';
                                } else if (data.event === 'message_end') {
                                    conversationId = data.conversation_id;
                                } else if (data.event === 'workflow_finished') {
                                    conversationId = data.conversation_id;
                                    if (data.outputs) {
                                        for (const key in data.outputs) {
                                            if (data.outputs[key]) {
                                                fullAnswer += data.outputs[key];
                                            }
                                        }
                                    }
                                } else if (data.event === 'error') {
                                    throw new Error(data.message);
                                }
                            } catch (e) {
                                if (e.message && !e.message.includes('JSON')) {
                                    console.error('Parse error:', e);
                                }
                            }
                        }
                    }
                }

                let cleanAnswer = fullAnswer;
                cleanAnswer = cleanAnswer.replace(/<think[\s\S]*?<\/think>/g, '');
                cleanAnswer = cleanAnswer.replace(/<think&gt;[\s\S]*?<\/think&gt;/g, '');
                cleanAnswer = cleanImageTags(cleanAnswer);
                cleanAnswer = cleanWhitespace(cleanAnswer);
                cleanAnswer = cleanAnswer.trim();
                addMessage('assistant', cleanAnswer);
                setStatus('在线', 'text-green-500');
                loadConversations();
                
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage('assistant', `抱歉，发生了错误：${error.message}`);
                setStatus('错误', 'text-red-500');
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', () => {
            const query = userInput.value.trim();
            if (query) {
                sendMessage(query);
                userInput.value = '';
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const conversationIdParam = urlParams.get('conversation_id');

            if (conversationIdParam) {
                conversationId = conversationIdParam;
                currentConversationId = conversationIdParam;
                // 通过URL参数跳转过来，标记为来自MVS重定向
                switchConversation(conversationIdParam, true);
            } else {
                // 不是通过URL参数跳转过来，正常加载对话列表
                loadConversations();
            }
        });

        async function loadConversations() {
            conversationsList.innerHTML = '<div class="loading-indicator"><i class="fa fa-spinner"></i> 加载中...</div>';
            
            try {
                const response = await fetch(`${DIFY_BASE_URL}/conversations?user=${DIFY_USER_ID}&limit=100&pinned=false`, {
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                conversations = data.data || [];
                renderConversationsList();
            } catch (error) {
                console.error('加载对话列表失败:', error);
                conversationsList.innerHTML = '<div class="empty-state"><i class="fa fa-comments"></i><p>加载失败</p></div>';
            }
        }

        function renderConversationsList() {
            conversationsList.innerHTML = '';
            
            if (conversations.length === 0) {
                conversationsList.innerHTML = '<div class="empty-state"><i class="fa fa-comments"></i><p>暂无对话记录</p><p style="font-size: 12px; margin-top: 4px;">点击上方按钮开启新对话</p></div>';
                return;
            }
            
            conversations.forEach(conv => {
                const item = document.createElement('div');
                item.className = `conversation-item ${currentConversationId === conv.id ? 'active' : ''}`;
                item.dataset.id = conv.id;
                
                const title = conv.name || conv.intro || '未命名对话';
                const time = formatConversationTime(conv.updated_at || conv.created_at);
                
                item.innerHTML = `
                    <div class="conv-icon">
                        <i class="fa fa-comment-o"></i>
                    </div>
                    <div class="conv-info">
                        <div class="conv-title">${escapeHtml(title)}</div>
                        <div class="conv-time">${time}</div>
                    </div>
                `;
                
                item.addEventListener('click', () => {
                    // 停止任何正在进行的轮询
                    stopMessagePolling();
                    switchConversation(conv.id);
                });
                
                conversationsList.appendChild(item);
            });
        }

        function formatConversationTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;
            
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        async function switchConversation(convId, isFromUrlParam = false) {
            if (isGenerating) return;
            
            currentConversationId = convId;
            messagesContainer.innerHTML = '';
            conversationId = convId;
            
            renderConversationsList();
            closeSidebar();
            
            try {
                setStatus('加载中...', 'text-blue-500');
                const response = await fetch(`${DIFY_BASE_URL}/messages?user=${DIFY_USER_ID}&conversation_id=${convId}&limit=20&last_id=`, {
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const messages = data.data || [];
                
                console.log(`[切换对话] 获取到 ${messages.length} 条消息`);
                console.log(`[切换对话] 消息数据:`, messages.map(msg => ({
                    hasQuery: !!msg.query,
                    hasAnswer: !!msg.answer,
                    queryLength: msg.query ? msg.query.length : 0,
                    answerLength: msg.answer ? msg.answer.length : 0,
                    answerPreview: msg.answer ? msg.answer.substring(0, 100) : null
                })));
                
                let assistantMessageCount = 0;
                let userMessageCount = 0;
                
                messages.reverse().forEach(msg => {
                    if (msg.query) {
                        console.log(`[切换对话] 用户消息: ${msg.query.substring(0, 50)}...`);
                        const cleanedQuery = cleanWhitespace(msg.query);
                        addMessage('user', cleanedQuery);
                        userMessageCount++;
                    }
                    if (msg.answer && msg.answer.trim().length > 0) {
                        console.log(`[切换对话] AI回复: ${msg.answer.substring(0, 50)}...`);
                        let cleanAnswer = msg.answer;
                        cleanAnswer = cleanAnswer.replace(/<think[\s\S]*?<\/think>/g, '');
                        cleanAnswer = cleanAnswer.replace(/<think&gt;[\s\S]*?<\/think&gt;/g, '');
                        cleanAnswer = cleanImageTags(cleanAnswer);
                        cleanAnswer = cleanWhitespace(cleanAnswer);
                        cleanAnswer = cleanAnswer.trim();
                        addMessage('assistant', cleanAnswer);
                        assistantMessageCount++;
                    }
                });
                
                console.log(`[切换对话] 统计: 用户消息 ${userMessageCount} 条, AI回复 ${assistantMessageCount} 条`);
                
                // 检查是否需要启动消息轮询
                // 如果是通过URL参数跳转过来的（MVS页面），并且没有AI回复，则启动轮询
                const urlParams = new URLSearchParams(window.location.search);
                const isFromMvsRedirect = urlParams.has('conversation_id');
                
                // 检查是否有用户消息但没有AI回复的情况
                const hasUserMessages = userMessageCount > 0;
                const hasAssistantMessages = assistantMessageCount > 0;
                
                console.log(`[切换对话] MVS跳转: ${isFromMvsRedirect}, 用户消息: ${hasUserMessages}, AI回复: ${hasAssistantMessages}`);
                
                if (isFromMvsRedirect && hasUserMessages && !hasAssistantMessages) {
                    // 通过MVS页面跳转过来，有用户消息但没有AI回复，启动轮询等待AI回复
                    console.log(`[切换对话] 启动轮询: 有用户消息但没有AI回复`);
                    startMessagePolling(convId, 0);
                } else if (isFromMvsRedirect && hasUserMessages && hasAssistantMessages) {
                    // 通过MVS页面跳转过来，有用户消息也有AI回复
                    // 检查用户消息数量是否比AI回复多（说明AI可能还在生成回复）
                    console.log(`[切换对话] 检查是否需要继续轮询: 用户消息 ${userMessageCount} 条, AI回复 ${assistantMessageCount} 条`);
                    if (userMessageCount > assistantMessageCount) {
                        console.log(`[切换对话] 启动轮询: 用户消息比AI回复多`);
                        startMessagePolling(convId, assistantMessageCount);
                    } else {
                        console.log(`[切换对话] 不需要轮询: 用户消息和AI回复数量匹配`);
                        setStatus('在线', 'text-green-500');
                    }
                } else {
                    console.log(`[切换对话] 不需要轮询`);
                    setStatus('在线', 'text-green-500');
                }
                
            } catch (error) {
                console.error('加载消息失败:', error);
                setStatus('错误', 'text-red-500');
            }
        }

        newChatBtn.addEventListener('click', () => {
            if (isGenerating) return;
            
            // 停止任何正在进行的轮询
            stopMessagePolling();
            
            currentConversationId = null;
            conversationId = '';
            messagesContainer.innerHTML = '';
            
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            
            userInput.focus();
            setStatus('在线', 'text-green-500');
            closeSidebar();
        });
        
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        }
        
        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        }
        
        function stopMessagePolling() {
            if (messagePollingInterval) {
                clearInterval(messagePollingInterval);
                messagePollingInterval = null;
            }
            if (messagePollingTimeout) {
                clearTimeout(messagePollingTimeout);
                messagePollingTimeout = null;
            }
            if (pollingStatusInterval) {
                clearInterval(pollingStatusInterval);
                pollingStatusInterval = null;
            }
            pollingStartTime = null;
            pollingRetryCount = 0;
            pollingCurrentInterval = 2000;
            
            // 记录轮询统计信息
            if (pollingStats.totalRequests > 0) {
                console.log('[轮询统计]', {
                    totalRequests: pollingStats.totalRequests,
                    successfulRequests: pollingStats.successfulRequests,
                    failedRequests: pollingStats.failedRequests,
                    totalRetries: pollingStats.totalRetries,
                    successRate: ((pollingStats.successfulRequests / pollingStats.totalRequests) * 100).toFixed(2) + '%',
                    lastSuccessTime: pollingStats.lastSuccessTime,
                    lastError: pollingStats.lastError
                });
            }
        }
        
        async function checkForNewMessages(convId, lastMessageCount) {
            try {
                console.log(`[轮询] 检查对话 ${convId} 的新消息，上次AI消息数量: ${lastMessageCount}`);
                
                // 更新统计信息
                pollingStats.totalRequests++;
                
                const response = await fetch(`${DIFY_BASE_URL}/messages?user=${DIFY_USER_ID}&conversation_id=${convId}&limit=20&last_id=`, {
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`
                    },
                    signal: AbortSignal.timeout(10000) // 10秒超时
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const messages = data.data || [];
                
                console.log(`[轮询] 获取到 ${messages.length} 条消息`);
                console.log(`[轮询] 消息数据:`, messages.map(msg => ({
                    hasQuery: !!msg.query,
                    hasAnswer: !!msg.answer,
                    queryLength: msg.query ? msg.query.length : 0,
                    answerLength: msg.answer ? msg.answer.length : 0,
                    answerPreview: msg.answer ? msg.answer.substring(0, 100) : null
                })));
                
                // 反转消息顺序，确保按时间顺序处理
                const reversedMessages = messages.reverse();
                
                // 检查是否有新的AI回复
                const allAssistantMessages = reversedMessages.filter(msg => msg.answer && msg.answer.trim().length > 0);
                const newAssistantMessages = allAssistantMessages.slice(lastMessageCount);
                
                console.log(`[轮询] 总共 ${allAssistantMessages.length} 条AI消息，新消息: ${newAssistantMessages.length} 条`);
                
                if (newAssistantMessages.length > 0) {
                    console.log(`[轮询] 发现新的AI回复，停止轮询`);
                    
                    // 停止轮询，因为已经收到了AI回复
                    stopMessagePolling();
                    
                    // 添加新的AI回复到聊天界面
                    newAssistantMessages.forEach(msg => {
                        console.log(`[轮询] 添加AI回复: ${msg.answer.substring(0, 50)}...`);
                        let cleanAnswer = msg.answer;
                        cleanAnswer = cleanAnswer.replace(/<think[\s\S]*?<\/think>/g, '');
                        cleanAnswer = cleanAnswer.replace(/<think&gt;[\s\S]*?<\/think&gt;/g, '');
                        cleanAnswer = cleanImageTags(cleanAnswer);
                        cleanAnswer = cleanWhitespace(cleanAnswer);
                        cleanAnswer = cleanAnswer.trim();
                        addMessage('assistant', cleanAnswer);
                    });
                    
                    // 更新成功统计
                    pollingStats.successfulRequests++;
                    pollingStats.lastSuccessTime = new Date().toISOString();
                    pollingStats.lastError = null;
                    
                    setStatus('在线', 'text-green-500');
                    return true;
                }
                
                console.log(`[轮询] 没有发现新的AI回复`);
                // 重置重试计数，因为请求成功
                pollingRetryCount = 0;
                // 更新成功统计
                pollingStats.successfulRequests++;
                pollingStats.lastSuccessTime = new Date().toISOString();
                pollingStats.lastError = null;
                
                return false;
            } catch (error) {
                console.error('检查新消息失败:', error);
                
                // 根据错误类型处理
                let errorMessage = '网络错误';
                if (error.name === 'TimeoutError') {
                    errorMessage = '请求超时';
                } else if (error.name === 'AbortError') {
                    errorMessage = '请求被中止';
                } else if (error.message.includes('HTTP error')) {
                    errorMessage = `服务器错误: ${error.message}`;
                }
                
                console.log(`[轮询] ${errorMessage}，重试 ${pollingRetryCount + 1}/${POLLING_MAX_RETRIES}`);
                
                // 更新失败统计
                pollingStats.failedRequests++;
                pollingStats.totalRetries++;
                pollingStats.lastError = {
                    message: errorMessage,
                    time: new Date().toISOString(),
                    retryCount: pollingRetryCount + 1
                };
                
                // 增加重试计数
                pollingRetryCount++;
                
                if (pollingRetryCount >= POLLING_MAX_RETRIES) {
                    console.error(`[轮询] 已达到最大重试次数 (${POLLING_MAX_RETRIES})，停止轮询`);
                    stopMessagePolling();
                    setStatus(`轮询失败: ${errorMessage}，请刷新页面重试`, 'text-red-500');
                    return false;
                }
                
                // 使用指数退避间隔
                pollingCurrentInterval = POLLING_INTERVALS[Math.min(pollingRetryCount, POLLING_INTERVALS.length - 1)];
                console.log(`[轮询] 第 ${pollingRetryCount} 次重试，下次间隔: ${pollingCurrentInterval}ms`);
                
                // 更新状态显示
                updatePollingStatus();
                
                return false;
            }
        }
        
        function updatePollingStatus() {
            if (!pollingStartTime) return;
            
            const elapsed = Date.now() - pollingStartTime;
            const remaining = Math.max(0, POLLING_MAX_DURATION - elapsed);
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            let statusText = `等待AI回复... (${minutes}:${seconds.toString().padStart(2, '0')})`;
            if (pollingRetryCount > 0) {
                statusText += ` (重试 ${pollingRetryCount}/${POLLING_MAX_RETRIES})`;
            }
            
            setStatus(statusText, 'text-blue-500');
        }
        
        function startMessagePolling(convId, lastMessageCount) {
            stopMessagePolling();
            
            // 初始化轮询状态
            pollingStartTime = Date.now();
            pollingRetryCount = 0;
            pollingCurrentInterval = POLLING_INTERVALS[0];
            
            // 设置轮询超时（10分钟后停止轮询）
            messagePollingTimeout = setTimeout(() => {
                stopMessagePolling();
                setStatus('AI思考超时，请重新发送问题', 'text-yellow-500');
                console.log('消息轮询超时，已停止轮询');
            }, POLLING_MAX_DURATION);
            
            // 启动状态更新
            updatePollingStatus();
            pollingStatusInterval = setInterval(updatePollingStatus, 1000);
            
            // 开始轮询检查
            const poll = async () => {
                const hasNewMessages = await checkForNewMessages(convId, lastMessageCount);
                if (hasNewMessages) {
                    // 如果收到了新消息，停止轮询
                    stopMessagePolling();
                    return;
                }
                
                // 如果没有新消息，继续下一次轮询
                if (messagePollingInterval) {
                    clearInterval(messagePollingInterval);
                }
                
                // 使用当前间隔进行下一次轮询
                messagePollingInterval = setTimeout(poll, pollingCurrentInterval);
            };
            
            // 立即开始第一次轮询
            poll();
        }
        
        function retryPolling() {
            if (!currentConversationId) {
                console.error('无法恢复轮询：没有当前对话');
                return;
            }
            
            console.log(`[恢复轮询] 重新启动对话 ${currentConversationId} 的轮询`);
            
            // 获取当前消息数量
            const assistantMessages = Array.from(messagesContainer.querySelectorAll('.message.assistant'));
            const lastMessageCount = assistantMessages.length;
            
            // 重新启动轮询
            startMessagePolling(currentConversationId, lastMessageCount);
        }
        
        retryPollingBtn.addEventListener('click', retryPolling);
        toggleSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
    </script>
