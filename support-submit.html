<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交问题 - 智能数据库管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#4080FF',
                        neutral: '#F5F7FA',
                        dark: '#1D2129',
                        light: '#C9CDD4',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F'
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors;
            }
            .card {
                @apply bg-white rounded-xl shadow-md border border-gray-100 p-6;
            }
        }
    </style>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
    </style>
</head>
<body class="bg-neutral min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <a href="index.html" class="text-primary text-xl"><i class="fa fa-arrow-left"></i></a>
                <h1 class="text-xl font-bold text-primary">vastbase 智能助手 - 量仔</h1>
            </div>
            <div class="flex items-center gap-3">
                <a href="support-chat.html" class="flex items-center gap-2 px-4 py-2 border border-primary text-primary rounded-lg text-sm hover:bg-primary hover:text-white transition-all">
                    <i class="fa fa-comments"></i>
                    <span>直接跳转聊天</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
        <div class="card">
            <div class="flex items-center mb-6">
                <i class="fa fa-question-circle text-primary text-2xl mr-3"></i>
                <div>
                    <h2 class="text-xl font-bold text-gray-800">提交问题</h2>
                    <p class="text-sm text-gray-500 mt-1">请填写以下问题澄清单，以便我们更好地为您服务</p>
                </div>
            </div>
            
            <div class="space-y-6">
                <!-- Import from JSON -->
                <div class="border-b border-gray-200 pb-6">
                    <label for="json-import" class="block text-sm font-medium text-gray-700 mb-2">从 JSON 文件导入</label>
                    <div class="flex items-center gap-3">
                        <input type="file" id="json-import" accept=".json" class="w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-l-lg file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20">
                        <button id="import-btn" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition-colors whitespace-nowrap">
                            <i class="fa fa-upload mr-2"></i>导入
                        </button>
                    </div>
                </div>

                <!-- 通用必填项 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-b border-gray-200 pb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">客户名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="customer-name" placeholder="请输入客户名称" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">发生问题环境 <span class="text-red-500">*</span></label>
                        <input type="text" id="environment" placeholder="如：生产环境、测试环境" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">产品版本 <span class="text-red-500">*</span></label>
                        <input type="text" id="product-version" placeholder="请输入产品版本号" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">硬件平台 <span class="text-red-500">*</span></label>
                        <input type="text" id="hardware-platform" placeholder="如：x86、ARM" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">操作系统 <span class="text-red-500">*</span></label>
                        <input type="text" id="os-version" placeholder="请输入操作系统及其版本" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">问题严重性 <span class="text-red-500">*</span></label>
                            <select id="severity" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-primary/50">
                                <option>低</option>
                                <option>中</option>
                                <option>高</option>
                                <option>紧急</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">紧急程度 <span class="text-red-500">*</span></label>
                            <select id="urgency" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-primary/50">
                                <option>低</option>
                                <option>中</option>
                                <option>高</option>
                                <option>紧急</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 问题分类及专属字段 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">问题大类 <span class="text-red-500">*</span></label>
                        <select id="issue-category" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-primary/50">
                            <option value="exBase">exBase</option>
                            <option value="G100">G100</option>
                            <option value="VEM">VEM</option>
                        </select>
                    </div>
                </div>

                <!-- exBase 专属字段 -->
                <div id="exBase-fields" class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-200">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">源库及版本 <span class="text-red-500">*</span></label>
                        <input type="text" id="source-db-version" placeholder="例如：Oracle 11g" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">目标库及版本 <span class="text-red-500">*</span></label>
                        <input type="text" id="target-db-version" placeholder="例如：Vastbase G100 V2.2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">执行具体动作 <span class="text-red-500">*</span></label>
                        <input type="text" id="action-executed" placeholder="例如：迁移、同步、备份" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                </div>

                <!-- G100 专属字段 (默认隐藏) -->
                <div id="G100-fields" class="hidden grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-200">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">兼容模式 <span class="text-red-500">*</span></label>
                        <input type="text" id="compat-mode" placeholder="例如：Oracle, MySQL" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div class="md:col-span-2">
                         <label class="block text-sm font-medium text-gray-700 mb-2">相关日志/用例 <span class="text-red-500">*</span></label>
                         <p class="text-xs text-gray-500 mb-2">请将数据库日志、操作系统日志、复现用例等打包上传至下方附件区域。</p>
                    </div>
                </div>

                <!-- VEM 专属字段 (默认隐藏) -->
                <div id="VEM-fields" class="hidden grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-200">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">功能模块 <span class="text-red-500">*</span></label>
                        <input type="text" id="feature-module" placeholder="例如：监控、备份、恢复" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">复现步骤 <span class="text-red-500">*</span></label>
                        <input type="text" id="repro-steps" placeholder="请简述复现问题的步骤" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50">
                    </div>
                     <div class="md:col-span-2">
                         <label class="block text-sm font-medium text-gray-700 mb-2">操作日志 <span class="text-red-500">*</span></label>
                         <p class="text-xs text-gray-500 mb-2">请将相关操作日志打包上传至下方附件区域。</p>
                    </div>
                </div>

                <!-- 问题描述 -->
                <div class="pt-6 border-t border-gray-200">
                    <label class="block text-sm font-medium text-gray-700 mb-2">问题描述 <span class="text-red-500">*</span></label>
                    <textarea id="issue-description" placeholder="请详细描述您遇到的问题，包括错误信息、操作步骤等..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 resize-none" rows="6"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">上传附件</label>
                    <div class="flex items-center justify-center w-full h-36 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 hover:border-primary/50 transition-all">
                        <label for="file-upload" class="flex flex-col items-center justify-center w-full h-full cursor-pointer">
                            <div class="flex flex-col items-center justify-center pt-3 pb-4">
                                <i class="fa fa-cloud-upload text-primary text-3xl mb-2"></i>
                                <p class="mb-1 text-sm text-gray-600"><span class="font-semibold text-primary">点击上传</span> 或拖放文件</p>
                                <p class="text-xs text-gray-500">支持日志文件、截图、配置文件等 (最大10MB)</p>
                            </div>
                            <input id="file-upload" type="file" class="hidden" multiple />
                        </label>
                    </div>
                    
                    <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 mt-3">
                        <div class="flex items-center justify-between mb-2">
                            <h4 class="font-semibold text-gray-700 text-sm">
                                <i class="fa fa-paperclip mr-1"></i>已上传文件 
                                <span id="file-count" class="text-xs text-gray-500 font-normal">(0个)</span>
                            </h4>
                        </div>
                        <div id="uploaded-files-container" class="max-h-48 overflow-y-auto custom-scrollbar">
                            <div id="uploaded-files" class="grid grid-cols-2 gap-2"></div>
                            <div id="no-files" class="text-center py-4 text-gray-500 text-sm">
                                <i class="fa fa-file-o text-lg mb-1"></i>
                                <p>暂无上传文件</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                    <button id="clear-issue" class="px-6 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition-colors">
                        <i class="fa fa-trash mr-2"></i>清空内容
                    </button>
                    <button id="submit-issue" class="btn-primary px-6 py-2.5">
                        <i class="fa fa-paper-plane mr-2"></i>提交问题
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM 元素获取
            const issueCategory = document.getElementById('issue-category');
            const exBaseFields = document.getElementById('exBase-fields');
            const g100Fields = document.getElementById('G100-fields');
            const vemFields = document.getElementById('VEM-fields');
            const submitIssueBtn = document.getElementById('submit-issue');
            const clearIssueBtn = document.getElementById('clear-issue');
            const fileUpload = document.getElementById('file-upload');
            const uploadedFilesContainer = document.getElementById('uploaded-files');
            const noFilesMessage = document.getElementById('no-files');
            const fileCount = document.getElementById('file-count');
            const jsonImportInput = document.getElementById('json-import');
            const importBtn = document.getElementById('import-btn');

            let uploadedFiles = [];

            // JSON import functionality
            importBtn.addEventListener('click', () => {
                const file = jsonImportInput.files[0];
                if (!file) {
                    showToast('warning', '请先选择一个 JSON 文件');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        // Populate fields from JSON data
                        document.getElementById('customer-name').value = data.customerName || '';
                        document.getElementById('environment').value = data.environment || '';
                        document.getElementById('product-version').value = data.productVersion || '';
                        document.getElementById('hardware-platform').value = data.hardwarePlatform || '';
                        document.getElementById('os-version').value = data.osVersion || '';
                        document.getElementById('severity').value = data.severity || '低';
                        document.getElementById('urgency').value = data.urgency || '低';
                        document.getElementById('issue-description').value = data.description || '';
                        
                        if (data.category) {
                            document.getElementById('issue-category').value = data.category;
                        }

                        if (data.category === 'exBase' && data.exBase) {
                            document.getElementById('source-db-version').value = data.exBase.sourceDbVersion || '';
                            document.getElementById('target-db-version').value = data.exBase.targetDbVersion || '';
                            document.getElementById('action-executed').value = data.exBase.actionExecuted || '';
                        }
                        if (data.category === 'G100' && data.g100) {
                            document.getElementById('compat-mode').value = data.g100.compatMode || '';
                        }
                        if (data.category === 'VEM' && data.vem) {
                            document.getElementById('feature-module').value = data.vem.featureModule || '';
                            document.getElementById('repro-steps').value = data.vem.reproSteps || '';
                        }

                        // Update UI based on new data
                        updateCategorySpecificFields();
                        showToast('success', '问题信息已从 JSON 文件导入');

                    } catch (error) {
                        showToast('error', '解析 JSON 文件失败: ' + error.message);
                    }
                };
                reader.onerror = function() {
                    showToast('error', '读取文件失败');
                };
                reader.readAsText(file);
            });

            // 更新专属字段的显示
            function updateCategorySpecificFields() {
                const selectedCategory = issueCategory.value;
                exBaseFields.style.display = 'none';
                g100Fields.style.display = 'none';
                vemFields.style.display = 'none';

                if (selectedCategory === 'exBase') {
                    exBaseFields.style.display = 'grid';
                } else if (selectedCategory === 'G100') {
                    g100Fields.style.display = 'grid';
                } else if (selectedCategory === 'VEM') {
                    vemFields.style.display = 'grid';
                }
            }

            // 问题大类选择事件
            issueCategory.addEventListener('change', updateCategorySpecificFields);

            // 清空表单
            clearIssueBtn.addEventListener('click', () => {
                document.querySelectorAll('input, textarea, select').forEach(el => {
                    if(el.tagName === 'SELECT') el.selectedIndex = 0;
                    else el.value = '';
                });
                uploadedFiles = [];
                updateFileList();
                updateCategorySpecificFields();
                showToast('info', '表单已清空');
            });

            // 提交问题事件
            submitIssueBtn.addEventListener('click', () => {
                const issueData = {
                    // 通用字段
                    customerName: document.getElementById('customer-name').value.trim(),
                    environment: document.getElementById('environment').value.trim(),
                    productVersion: document.getElementById('product-version').value.trim(),
                    hardwarePlatform: document.getElementById('hardware-platform').value.trim(),
                    osVersion: document.getElementById('os-version').value.trim(),
                    severity: document.getElementById('severity').value,
                    urgency: document.getElementById('urgency').value,
                    description: document.getElementById('issue-description').value.trim(),
                    category: issueCategory.value,
                    // 专属字段
                    exBase: {},
                    g100: {},
                    vem: {},
                    // 文件
                    files: uploadedFiles
                };

                // 校验通用字段
                const requiredGeneralFields = {
                    customerName: '客户名称',
                    environment: '发生问题环境',
                    productVersion: '产品版本',
                    hardwarePlatform: '硬件平台',
                    osVersion: '操作系统',
                    description: '问题描述'
                };

                for (const [key, name] of Object.entries(requiredGeneralFields)) {
                    if (!issueData[key]) {
                        showToast('error', `${name} 是必填项`);
                        return;
                    }
                }

                // 根据分类收集和校验专属字段
                if (issueData.category === 'exBase') {
                    issueData.exBase.sourceDbVersion = document.getElementById('source-db-version').value.trim();
                    issueData.exBase.targetDbVersion = document.getElementById('target-db-version').value.trim();
                    issueData.exBase.actionExecuted = document.getElementById('action-executed').value.trim();
                    if (!issueData.exBase.sourceDbVersion || !issueData.exBase.targetDbVersion || !issueData.exBase.actionExecuted) {
                        showToast('error', '请填写所有 exBase 专属必填项');
                        return;
                    }
                } else if (issueData.category === 'G100') {
                    issueData.g100.compatMode = document.getElementById('compat-mode').value.trim();
                    if (!issueData.g100.compatMode) {
                        showToast('error', '请填写兼容模式');
                        return;
                    }
                    if (issueData.files.length === 0) {
                        showToast('error', '请上传 G100 相关的日志或用例文件');
                        return;
                    }
                } else if (issueData.category === 'VEM') {
                    issueData.vem.featureModule = document.getElementById('feature-module').value.trim();
                    issueData.vem.reproSteps = document.getElementById('repro-steps').value.trim();
                    if (!issueData.vem.featureModule || !issueData.vem.reproSteps) {
                        showToast('error', '请填写所有 VEM 专属必填项');
                        return;
                    }
                     if (issueData.files.length === 0) {
                        showToast('error', '请上传 VEM 相关的操作日志文件');
                        return;
                    }
                }

                // 存储到 sessionStorage 并跳转
                sessionStorage.setItem('pendingIssue', JSON.stringify(issueData));
                window.location.href = 'support-chat.html';
            });

            // --- 文件上传相关函数 ---
            function handleFileUpload(files) {
                const maxSize = 10 * 1024 * 1024;
                Array.from(files).forEach(file => {
                    if (file.size > maxSize) {
                        showToast('error', `文件 ${file.name} 超过10MB限制`);
                        return;
                    }
                    const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).substring(2, 9);
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        uploadedFiles.push({
                            id: fileId, name: file.name, size: file.size, type: file.type, content: e.target.result
                        });
                        updateFileList();
                        showToast('success', `文件 ${file.name} 上传成功`);
                    };
                    reader.readAsDataURL(file);
                });
            }

            function updateFileList() {
                uploadedFilesContainer.innerHTML = '';
                if (uploadedFiles.length === 0) {
                    noFilesMessage.classList.remove('hidden');
                    fileCount.textContent = '(0个)';
                } else {
                    noFilesMessage.classList.add('hidden');
                    fileCount.textContent = `(${uploadedFiles.length}个)`;
                    uploadedFiles.forEach(file => {
                        const fileItem = document.createElement('div');
                        fileItem.className = 'flex items-center justify-between p-2 bg-gray-50 rounded-lg border';
                        fileItem.innerHTML = `
                            <div class="flex items-center gap-2 overflow-hidden">
                                <i class="fa fa-file-o text-primary"></i>
                                <span class="text-sm truncate">${file.name}</span>
                            </div>
                            <button class="remove-file-btn text-gray-400 hover:text-red-500" data-id="${file.id}"><i class="fa fa-times"></i></button>
                        `;
                        fileItem.querySelector('.remove-file-btn').addEventListener('click', function() {
                            uploadedFiles = uploadedFiles.filter(f => f.id !== file.id);
                            updateFileList();
                        });
                        uploadedFilesContainer.appendChild(fileItem);
                    });
                }
            }

            fileUpload.addEventListener('change', (e) => handleFileUpload(e.target.files));
            
            // 拖拽上传
            const dropZone = fileUpload.closest('label').parentElement;
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('border-primary', 'bg-blue-50');
            });
            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-primary', 'bg-blue-50');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-primary', 'bg-blue-50');
                if (e.dataTransfer.files.length) {
                    handleFileUpload(e.dataTransfer.files);
                }
            });

            // --- Toast 通知 --- 
            function showToast(type, message) {
                const toast = document.createElement('div');
                toast.className = `fixed top-5 right-5 p-4 rounded-lg shadow-lg text-white z-50 ${type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            // 初始化
            updateCategorySpecificFields();
            updateFileList();
        });
    </script>
</body>
</html>
